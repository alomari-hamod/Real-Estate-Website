<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Real Estate</title>
    <link rel="stylesheet" type="text/css" href="CssFile/admin.css">
</head>
<body>
<div class="admin-container">
    <!-- رأس لوحة التحكم -->
    <div class="admin-header">
        <h1>لوحة تحكم المسؤول</h1>
        <p>مرحباً بك، حمودي!</p>
    </div>

    <!-- إجراءات المسؤول -->
    <div class="admin-actions">
        <div class="action-card" onclick="manageProperties()">
            <div class="action-icon">🏠</div>
            <div class="action-title">إدارة العقارات</div>
            <div class="action-description">عرض، تعديل وحذف العقارات</div>
        </div>

        <div class="action-card" onclick="manageUsers()">
            <div class="action-icon">👥</div>
            <div class="action-title">إدارة المستخدمين</div>
            <div class="action-description">عرض وإدارة حسابات المستخدمين</div>
        </div>

        <div class="action-card" onclick="viewReports()">
            <div class="action-icon">📊</div>
            <div class="action-title">التقارير والإحصائيات</div>
            <div class="action-description">عرض تقارير الأداء والإحصائيات</div>
        </div>

        <div class="action-card" onclick="addNewProperty()">
            <div class="action-icon">➕</div>
            <div class="action-title">إضافة عقار جديد</div>
            <div class="action-description">إضافة عقار جديد للموقع</div>
        </div>
    </div>

    <!-- قسم الإعدادات -->
    <div style="text-align: center; margin: 30px 0;">
        <button class="logout-btn" onclick="logoutAdmin()">تسجيل الخروج</button>
    </div>

    <div class="back-to-home">
        <button class="back-btn" onclick="goToHome()">العودة للصفحة الرئيسية</button>
    </div>
</div>

<script type="text/javascript" src="JavaScript_file/admin.js"></script>

</body>
</html>
